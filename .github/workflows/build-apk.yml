name: Build Debug APK

# Builds a debug (unsigned-for-Play-Store, self-signed-for-install) APK
# automatically on every push, and whenever you trigger it manually from
# the Actions tab. Runs entirely on GitHub's free hosted runners — this
# costs nothing on a public repo.

"on":
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PlacerFireWatch-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
